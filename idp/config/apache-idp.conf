<VirtualHost *:80>
    ServerName ${IDP_HOSTNAME:-idp.sso.local}

    # SimpleSAMLphp 2.x serves from the public/ subdirectory
    DocumentRoot /var/simplesamlphp/public

    Alias /simplesaml /var/simplesamlphp/public

    <Directory /var/simplesamlphp/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Front-controller rewrite
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^ index.php [QSA,L]
    </Directory>

    # Deny access to everything outside public/
    <Directory /var/simplesamlphp>
        Options None
        AllowOverride None
        Require all denied
    </Directory>
    <Directory /var/simplesamlphp/public>
        Require all granted
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/idp-error.log
    CustomLog ${APACHE_LOG_DIR}/idp-access.log combined
</VirtualHost>
