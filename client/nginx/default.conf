server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health check
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA: serve files directly; hash-based routing needs no fallback rewrites.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    # ─────────────────
    # connect-src includes sp.sso.local so the SPA can call the API cross-origin
    # in UI-only dev mode.  Full auth (cookie + SAML) only works from the SP origin.
    #
    # FingerprintJS is bundled locally (fpjs.js); no external script sources needed.
    add_header X-Frame-Options        "DENY"           always;
    add_header X-Content-Type-Options "nosniff"        always;
    add_header Referrer-Policy        "no-referrer"    always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; connect-src 'self' https://sp.sso.local; style-src 'self' 'unsafe-inline'"
        always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
