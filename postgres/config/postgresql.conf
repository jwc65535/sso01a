# =============================================================================
# postgres/config/postgresql.conf
# Applied by postgres/init/00-hba.sh — appended to $PGDATA/postgresql.conf
# after initdb so our settings override the auto-generated defaults.
#
# DESIGN NOTES
# ─────────────
# • ssl = on is set unconditionally here; 00-hba.sh only appends this block
#   when server.crt / server.key exist in /var/lib/postgresql/ssl/.
# • ssl_ca_file points to the Vault-issued CA chain populated by make bootstrap
#   (pki/scripts/bootstrap-ca.sh exports it to postgres/ssl/ca-chain.pem).
# • ssl_crl_file is commented out by default; uncomment once the bootstrap
#   has run and /var/lib/postgresql/ssl/crl.pem is populated.
# • All settings here target dev; production-grade values are noted inline.
# =============================================================================

# ── Connections ───────────────────────────────────────────────────────────────
listen_addresses = '*'
port             = 5432
max_connections  = 100          # PROD: tune based on connection pool size

# ── SSL / mTLS ────────────────────────────────────────────────────────────────
ssl                      = on
ssl_cert_file            = '/var/lib/postgresql/ssl/server.crt'
ssl_key_file             = '/var/lib/postgresql/ssl/server.key'
# CA chain that signed client certificates (issued by Vault intermediate CA).
ssl_ca_file              = '/var/lib/postgresql/ssl/ca-chain.pem'
# CRL: uncomment once /var/lib/postgresql/ssl/crl.pem is present.
# Postgres reads the CRL file on each new connection (since PG 14).
# ssl_crl_file           = '/var/lib/postgresql/ssl/crl.pem'
ssl_min_protocol_version = 'TLSv1.2'   # PROD: set to TLSv1.3
ssl_prefer_server_ciphers = on

# ── Authentication ────────────────────────────────────────────────────────────
# scram-sha-256 is the minimum for any password-based auth (sso_admin, sso_app dev).
password_encryption = scram-sha-256

# ── Logging (audit trail) ─────────────────────────────────────────────────────
# Log every connection and disconnection — required for zero-trust audit.
log_connections    = on
log_disconnections = on
log_hostname       = off        # avoid DNS latency; IP addresses are sufficient
log_timezone       = 'UTC'
log_line_prefix    = '%t [%p]: user=%u,db=%d,client=%h '
# Log DDL and all failed auth events; avoid logging query params (may contain PII).
log_statement      = 'ddl'
log_min_messages   = 'WARNING'
log_min_error_statement = 'ERROR'

# ── Resource limits ───────────────────────────────────────────────────────────
shared_buffers            = 128MB   # PROD: 25 % of total RAM
work_mem                  = 4MB
maintenance_work_mem      = 64MB
effective_cache_size      = 512MB   # PROD: 75 % of total RAM

# ── Locale / encoding ────────────────────────────────────────────────────────
timezone           = 'UTC'
lc_messages        = 'en_US.utf8'
