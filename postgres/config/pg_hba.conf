# =============================================================================
# postgres/config/pg_hba.conf
# Installed by postgres/init/00-hba.sh after initdb.
# Rule order matters: first match wins.
#
# AUTHENTICATION DESIGN
# ─────────────────────
# • sso_admin  — scram-sha-256, localhost only (bootstrap/maintenance access)
# • sso_app    — scram-sha-256 from any Docker-internal IP in dev;
#                switch to cert auth (hostssl) in production by commenting out
#                the dev rule and letting it fall through to the hostssl catch-all
# • All others — hostssl + client certificate required; cert CN must equal the
#                PostgreSQL role name (enforced by pg_ident.conf ssl map)
# • Catch-all  — reject (explicit; never rely on implicit denial)
#
# PRODUCTION HARDENING
# ─────────────────────
# 1. Remove or restrict the sso_app scram-sha-256 rule; add a dedicated
#    hostssl line for sso_app that requires its own Vault-issued cert.
# 2. Remove the sso_admin local+host rules once per-user cert auth is validated.
# 3. Enable ssl_crl_file in postgresql.conf to enforce revocation.
#
# TYPE   DATABASE  USER        ADDRESS          METHOD
# =============================================================================

# ── sso_admin: localhost only via scram-sha-256 ───────────────────────────────
# Used for: initdb, make bootstrap, emergency maintenance.
# Never reachable from outside the host or the Docker bridge.
local   all        sso_admin                        scram-sha-256
host    all        sso_admin    127.0.0.1/32         scram-sha-256
host    all        sso_admin    ::1/128              scram-sha-256

# ── sso_app: scram-sha-256 from within Docker bridge (DEV ONLY) ───────────────
# The Golang app connects here in dev (sslmode=disable, POSTGRES_DSN).
# The Docker `db` network is internal: true so this is never internet-routable.
# PROD: comment these two lines out; sso_app must present a client cert instead.
host    sso        sso_app      0.0.0.0/0            scram-sha-256

# ── All end-user roles: SSL + client certificate required ────────────────────
# • Connection must be TLS-encrypted (hostssl).
# • Client must present a certificate signed by the Vault intermediate CA
#   (configured via ssl_ca_file in postgresql.conf).
# • clientcert=verify-full: verify cert chain AND that the CN matches a login role.
# • map=ssl: pg_ident.conf ssl map routes cert CN → PostgreSQL role name.
#
# Role must exist (created by provision_user_role() at SAML enrolment time).
# If the CN has no matching role, PostgreSQL returns "role does not exist" —
# cert forgery alone is insufficient; the LDAP+DB enrolment step is also required.
hostssl sso        all          0.0.0.0/0            cert clientcert=verify-full map=ssl

# ── Catch-all: explicit reject ────────────────────────────────────────────────
host    all        all          0.0.0.0/0            reject
