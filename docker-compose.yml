---
# docker-compose.yml — sso01a zero-trust authentication stack
# Vault runs in dev mode (HTTP) for local bootstrap; swap the vault service
# command to production mode once pki/scripts/bootstrap-ca.sh has run.
#
# NETWORK MODE: host
# All services use network_mode: host because the sandbox environment does not
# support Linux veth pair creation (required for Docker bridge networks).
# Inter-service communication uses 127.0.0.1 instead of container DNS names.
# The idp listens on port 8880 (not 80) to avoid conflicting with the sp.

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  vault-data:
  ldap-data:
  ldap-config:
  ldap-sentinel:        # holds .sso-configured sentinel; prevents re-running first-run init
  postgres-data:
  vault-agent-token:    # single-file volume: vault writes token, agent reads it
  consul-tmpl-certs:    # rendered public certs waiting for LDAP push
  pki-root:             # root CA material; mounted read-only everywhere else
  shib-keys:            # SP signing/encryption keys generated at first boot
  idp-cert:             # IdP SAML signing cert; persisted so the SP doesn't need metadata updates on restart

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # ── HashiCorp Vault — dev mode (PKI engine configured by vault/scripts) ───
  vault:
    image: hashicorp/vault:1.17
    container_name: sso-vault
    hostname: vault
    restart: unless-stopped
    network_mode: host
    cap_add:
      - IPC_LOCK
    command:
      - "server"
      - "-dev"
      - "-dev-root-token-id=${VAULT_DEV_ROOT_TOKEN_ID:-devroot}"
      - "-dev-listen-address=0.0.0.0:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_DEV_ROOT_TOKEN_ID:-devroot}"
      VAULT_LOG_LEVEL: "info"
      VAULT_ADDR: "http://127.0.0.1:8200"
    env_file: .env
    volumes:
      - vault-data:/vault/data
      # vault/config is NOT mounted in dev mode — vault.hcl is for production only
      # (it references /vault/audit/vault.log which doesn't exist in dev).
      # The -dev flag handles all config via CLI args.
      - ./vault/scripts:/vault/scripts:ro
      - ./vault/policies:/vault/policies:ro
      - vault-agent-token:/vault/agent-token
    healthcheck:
      test:
        - "CMD"
        - "sh"
        - "-c"
        - "VAULT_ADDR=http://127.0.0.1:8200 vault status | grep -q 'Initialized.*true'"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  # ── Vault Agent — authenticates to Vault, writes a renewable token ───────
  # entrypoint.sh writes $VAULT_TOKEN to /vault/agent-token/token so the
  # token_file auth method in agent.hcl can bootstrap without AppRole secrets.
  # In production: switch agent.hcl to the approle method and remove the
  # VAULT_TOKEN env var from this service entirely.
  vault-agent:
    image: hashicorp/vault:1.17
    container_name: sso-vault-agent
    hostname: vault-agent
    restart: unless-stopped
    network_mode: host
    entrypoint: ["/vault/agent/entrypoint.sh"]
    command: []
    environment:
      VAULT_ADDR: "http://127.0.0.1:8200"
      # DEV: root token passed so entrypoint.sh can write the token_file.
      # PROD: remove this env var; inject the AppRole secret-id instead.
      VAULT_TOKEN: "${VAULT_DEV_ROOT_TOKEN_ID:-devroot}"
    env_file: .env
    depends_on:
      vault:
        condition: service_healthy
    volumes:
      - ./vault/agent:/vault/agent:ro
      - vault-agent-token:/vault/agent-token
      - consul-tmpl-certs:/vault/rendered
    healthcheck:
      test:
        - "CMD-SHELL"
        - "test -f /vault/agent-token/agent.token"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  # ── Consul Template — watches Vault PKI, pushes public certs to LDAP ─────
  # Reads the Vault token from the vault-agent-token volume (written by the
  # vault-agent sink) — does NOT use the root token directly.
  # Authenticates to LDAP as cert-writer (ACL rule 1: cert attrs only).
  # Periodic SIGHUP every 30 min from entrypoint.sh keeps LDAP in sync even
  # without a Vault lease event.
  consul-template:
    build:
      context: ./consul-template
      dockerfile: Dockerfile
      network: host
    image: sso01a/consul-template:local
    container_name: sso-consul-template
    hostname: consul-template
    restart: unless-stopped
    network_mode: host
    environment:
      VAULT_ADDR: "http://127.0.0.1:8200"
      # consul-template reads its Vault token from vault_agent_token_file in
      # consul-template.hcl — the VAULT_TOKEN env var is NOT used.
      # cert-writer LDAP credentials (push script reads password from secret file).
      LDAP_BIND_DN: "cn=cert-writer,ou=service-accounts,${LDAP_BASE_DN:-dc=sso,dc=local}"
      LDAP_BASE_DN: "${LDAP_BASE_DN:-dc=sso,dc=local}"
      LDAP_HOST: "127.0.0.1"
      LDAP_PORT: "1389"
    env_file: .env
    depends_on:
      vault-agent:
        condition: service_healthy   # wait until vault-agent has written agent.token
      ldap:
        condition: service_healthy
    volumes:
      - ./consul-template:/etc/consul-template:ro
      - vault-agent-token:/vault/agent-token:ro
      - consul-tmpl-certs:/vault/rendered
    secrets:
      - ldap_cert_writer_password
    healthcheck:
      # Healthy once the first push script has been rendered.
      test:
        - "CMD-SHELL"
        - "test -f /vault/rendered/ldap-cert-push.sh"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── OpenLDAP — public-certificate directory (no secrets stored here) ──────
  # Custom image (debian:bookworm-slim + slapd) adds: ssoUser schema,
  # cert-writer service account, ACLs applied to cn=config via SASL EXTERNAL
  # during first-run init.  See ldap/scripts/entrypoint.sh for the sequence.
  # Previously used bitnami/openldap:2 (removed from Docker Hub May 2025).
  ldap:
    build:
      context: ./ldap
      dockerfile: Dockerfile
      network: host
    image: sso01a/ldap:local
    container_name: sso-ldap
    hostname: ldap
    restart: unless-stopped
    network_mode: host
    # entrypoint.sh runs as root for first-run cn=config setup,
    # then execs slapd as the openldap user via gosu.
    user: "root"
    environment:
      LDAP_ROOT: "${LDAP_BASE_DN:-dc=sso,dc=local}"
      LDAP_DOMAIN: "${LDAP_DOMAIN:-sso.local}"
      LDAP_ADMIN_USERNAME: "admin"
      # Password injected via Docker secret; entrypoint reads
      # /run/secrets/ldap_admin_password. This env var is a fallback only.
      LDAP_ADMIN_PASSWORD: "${LDAP_ADMIN_PASSWORD:-changeme_replace_me}"
      LDAP_ORGANISATION: "${LDAP_ORGANISATION:-sso01a}"
      LDAP_LOGLEVEL: "256"
      DOMAIN: "${DOMAIN:-sso.local}"
      # DEV: password set on alice and bob so the IdP can LDAP-authenticate them.
      # PROD: remove this; provision real passwords via IAM / self-service portal.
      DEV_USER_PASSWORD: "${DEV_USER_PASSWORD:-changeme}"
    env_file: .env
    volumes:
      # Persistent OLC config — dpkg-reconfigure writes here on first run
      - ldap-config:/etc/ldap/slapd.d
      # Persistent MDB data directory
      - ldap-data:/var/lib/ldap
      # First-run sentinel; separate volume so data and config can be wiped
      # independently without accidentally losing the sentinel (or vice versa).
      - ldap-sentinel:/var/lib/ldap-sentinel
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          ldapsearch -x -H ldap://localhost:1389
          -b 'dc=sso,dc=local'
          -D 'cn=admin,dc=sso,dc=local'
          -w "$(cat /run/secrets/ldap_admin_password 2>/dev/null || echo changeme_replace_me)"
          '(objectClass=organizationalUnit)' dn
          2>/dev/null | grep -q '^dn:'
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    secrets:
      - ldap_admin_password
      - ldap_cert_writer_password

  # ── SimpleSAMLphp IdP ────────────────────────────────────────────────────
  # Authenticates users against OpenLDAP (LDAP bind as the user).
  # Issues SAML 2.0 assertions signed with a self-signed RSA-3072 cert
  # (separate from Vault PKI — intentional: different trust domain).
  #
  # DEV BROWSER ACCESS
  # ───────────────────
  # The SP redirects the browser to the IdP's SSO URL.  In dev, that URL must
  # be reachable by the browser.  Add this line to /etc/hosts:
  #   127.0.0.1  idp.sso.local
  # The IdP listens on port 8880 (not 80) to avoid conflict with the SP.
  # Access at http://idp.sso.local:8880/simplesaml/ or http://localhost:8880/simplesaml/.
  idp:
    build:
      context: ./idp
      dockerfile: Dockerfile
      network: host
    image: sso01a/idp:local
    container_name: sso-idp
    hostname: idp
    restart: unless-stopped
    network_mode: host
    environment:
      # Docker secret file path — init.sh reads this and exports SSP_ADMIN_PASSWORD
      SSP_ADMIN_PASSWORD_FILE: /run/secrets/ssp_admin_password
      SSP_SECRET_SALT: "${SSP_SECRET_SALT:-CHANGE_ME_IN_PRODUCTION}"
      # Public URL used by SSP to build redirect URLs and assertion endpoints.
      # DEV:  http://idp.sso.local:8880/simplesaml/  (host networking: port 8880 directly)
      # PROD: https://idp.sso.local/simplesaml/
      IDP_BASEURLPATH: "${IDP_BASEURLPATH:-http://idp.sso.local:8880/simplesaml/}"
      IDP_ENTITY_ID: "${IDP_ENTITY_ID:-https://idp.sso.local/simplesaml/saml2/idp/metadata.php}"
      SP_ENTITY_ID: "${SP_ENTITY_ID:-https://sp.sso.local/shibboleth}"
      SP_ACS_URL: "${SP_ACS_URL:-https://sp.sso.local/Shibboleth.sso/SAML2/POST}"
      LDAP_HOST: "127.0.0.1"
      LDAP_PORT: "1389"
      LDAP_BASE_DN: "${LDAP_BASE_DN:-dc=sso,dc=local}"
    env_file: .env
    depends_on:
      ldap:
        condition: service_healthy
    volumes:
      # Config and metadata are bind-mounted read-only (edit on host, reload takes effect).
      - ./idp/config:/var/simplesamlphp/config:ro
      - ./idp/metadata:/var/simplesamlphp/metadata:ro
      # SAML signing cert is persisted in a named volume.
      # Changing the cert requires updating the SP's metadata (saml20-sp-remote.php
      # certData field in Prompt 8).  Never delete this volume carelessly.
      - idp-cert:/var/simplesamlphp/cert
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8880/simplesaml/module.php/core/welcome"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    secrets:
      - ssp_admin_password
      - ldap_admin_password

  # ── Shibboleth SP + Apache HTTPD ─────────────────────────────────────────
  sp:
    build:
      context: ./sp
      dockerfile: Dockerfile
      network: host
    image: sso01a/sp:local
    container_name: sso-sp
    hostname: sp
    restart: unless-stopped
    network_mode: host
    environment:
      SP_HOSTNAME: "${SP_HOSTNAME:-sp.sso.local}"
      SP_ENTITY_ID: "${SP_ENTITY_ID:-https://sp.sso.local/shibboleth}"
      IDP_ENTITY_ID: "${IDP_ENTITY_ID:-https://idp.sso.local/simplesaml/saml2/idp/metadata.php}"
      # With host networking, the sp reaches the idp via localhost:8880
      IDP_METADATA_URL: "http://127.0.0.1:8880/simplesaml/saml2/idp/metadata.php"
      APP_BACKEND: "http://127.0.0.1:8080"
      LDAP_HOST: "127.0.0.1"
      LDAP_PORT: "1389"
      LDAP_BASE_DN: "${LDAP_BASE_DN:-dc=sso,dc=local}"
    env_file: .env
    depends_on:
      idp:
        condition: service_healthy
      app:
        condition: service_healthy
    volumes:
      # Source dir: bind-mounted read-only; init.sh copies + envsubsts into /etc/shibboleth/
      - ./sp/shibboleth:/etc/shibboleth-src:ro
      - ./sp/apache/vhosts:/etc/apache2/sites-enabled:ro
      - shib-keys:/etc/shibboleth/keys    # generated at first boot, persisted
      # SPA static files — served directly by Apache at DocumentRoot /var/www/html.
      - ./client/src:/var/www/html:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Golang Application Server ─────────────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      network: host
    image: sso01a/app:local
    container_name: sso-app
    hostname: app
    restart: unless-stopped
    network_mode: host
    environment:
      APP_PORT: "${APP_PORT:-8080}"
      APP_ENV: "${APP_ENV:-development}"
      VAULT_ADDR: "http://127.0.0.1:8200"
      VAULT_TOKEN: "${VAULT_DEV_ROOT_TOKEN_ID:-devroot}"
      # Vault PKI — intermediate CA mount + role used to sign user CSRs.
      VAULT_PKI_INT_MOUNT: "${VAULT_PKI_INT_MOUNT:-pki_int}"
      VAULT_PKI_ROLE: "${VAULT_PKI_ROLE:-user-cert}"
      VAULT_CERT_TTL: "${VAULT_CERT_TTL:-1h}"     # 1h — user cert expires with JWT session
      # DEV: connects as sso_app via scram-sha-256 (no TLS); pg_hba.conf allows
      #      this from any IP on the internal Docker bridge network.
      # PROD: change sslmode=verify-full and supply sslcert/sslkey/sslrootcert
      #       so the Golang app presents its own Vault-issued client cert (CN=sso_app).
      POSTGRES_DSN: "host=127.0.0.1 port=5432 dbname=${POSTGRES_DB:-sso} user=sso_app sslmode=${POSTGRES_SSL_MODE:-disable}"
      # App reads its DB password from the Docker secret file at startup.
      POSTGRES_APP_PASSWORD_FILE: /run/secrets/postgres_app_password
      # Per-user x509 connection factory — separate host/port/dbname so the
      # factory can build individual pgx.Conn objects with per-user TLS certs.
      PG_HOST: "127.0.0.1"
      PG_PORT: "5432"
      PG_DBNAME: "${POSTGRES_DB:-sso}"
      LDAP_HOST: "127.0.0.1"
      LDAP_PORT: "1389"
      LDAP_BASE_DN: "${LDAP_BASE_DN:-dc=sso,dc=local}"
      JWT_ISSUER: "${JWT_ISSUER:-https://sp.sso.local}"
      JWT_AUDIENCE: "${JWT_AUDIENCE:-https://app.sso.local}"
      JWT_TTL: "${JWT_TTL:-3600}"
      # TOTP-derived key sealing — masterSecret read from Docker secret file.
      TOTP_MASTER_SECRET_FILE: /run/secrets/totp_master_secret
      TOTP_ALGORITHM: "${TOTP_ALGORITHM:-SHA256}"
      TOTP_DIGITS: "${TOTP_DIGITS:-8}"
      TOTP_PERIOD: "${TOTP_PERIOD:-30}"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
    volumes:
      - consul-tmpl-certs:/certs:ro
    secrets:
      - postgres_app_password
      - totp_master_secret
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── PostgreSQL — per-user roles, certificate authentication only ──────────
  # pg_hba.conf enforces:
  #   • sso_admin:  scram-sha-256, localhost only (maintenance)
  #   • sso_app:    scram-sha-256 from internal Docker net (dev); cert in prod
  #   • all others: hostssl + client cert (CN must match a provisioned role)
  # TLS certs are pre-populated by `make pki-bootstrap` into postgres/ssl/.
  # If postgres/ssl/ is empty, TLS is disabled and only sso_admin/sso_app work.
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
      network: host
    image: sso01a/postgres:local
    container_name: sso-postgres
    hostname: postgres
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-sso}"
      POSTGRES_USER: "${POSTGRES_ADMIN_USER:-sso_admin}"
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_admin_password
      PGDATA: /var/lib/postgresql/data/pgdata
      # POSTGRES_HOST_AUTH_METHOD controls the auth method initdb writes into
      # the auto-generated pg_hba.conf.  Our 00-hba.sh REPLACES that file, so
      # this value only matters during the initdb trust phase.
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
    env_file: .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # ssl/: bind-mount of host postgres/ssl/ directory.
      # Populated by `make pki-bootstrap` with:
      #   server.crt, server.key  — Vault-issued server cert (CN=postgres)
      #   ca-chain.pem            — Vault intermediate CA chain (verifies client certs)
      #   crl.pem                 — CRL (populated by make cert-push-now; optional)
      - ./postgres/ssl:/var/lib/postgresql/ssl:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U ${POSTGRES_ADMIN_USER:-sso_admin} -d ${POSTGRES_DB:-sso}"
      interval: 5s
      timeout: 5s
      retries: 20
    secrets:
      - postgres_admin_password
      - postgres_app_password

  # ── Client SPA — nginx serving FingerprintJS frontend ────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      network: host
    image: sso01a/client:local
    container_name: sso-client
    hostname: client
    restart: unless-stopped
    network_mode: host
    environment:
      FPJS_API_KEY: "${FPJS_API_KEY:-}"
      SP_BASE_URL: "https://${SP_HOSTNAME:-sp.sso.local}"
    env_file: .env
    volumes:
      - ./client/nginx:/etc/nginx/conf.d:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

# ---------------------------------------------------------------------------
# Docker secrets
# ---------------------------------------------------------------------------
secrets:
  ldap_admin_password:
    file: ./secrets/ldap_admin_password.txt
  ldap_cert_writer_password:
    file: ./secrets/ldap_cert_writer_password.txt
  postgres_admin_password:
    file: ./secrets/postgres_admin_password.txt
  postgres_app_password:
    file: ./secrets/postgres_app_password.txt
  ssp_admin_password:
    file: ./secrets/ssp_admin_password.txt
  totp_master_secret:
    file: ./secrets/totp_master_secret.txt
