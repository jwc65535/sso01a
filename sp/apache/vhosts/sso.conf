# =============================================================================
# sso.conf — Apache vhost for sso01a Shibboleth SP
#
# Port 80:  healthz probe served locally; all other traffic → HTTPS redirect
# Port 443: static SPA from DocumentRoot + /api/* proxied to Golang backend
#
# AUTHENTICATION SCOPE
# ─────────────────────
# Shibboleth is required ONLY for /api/token.  All other paths are handled
# by the Golang backend's JWT middleware (Bearer token or HttpOnly cookie).
# This allows the SPA to load without a SAML session and drive the auth
# flow itself (detect session → call /api/token → obtain JWT cookie).
#
# ShibUseHeaders On at VirtualHost scope means that when a Shibboleth session
# exists, attributes ARE injected as headers even on unprotected paths.
# The backend uses this for /api/token; no other path reads these headers.
#
# SINGLE-MODULE COMPROMISE (Apache/Shibboleth SP owned)
# ──────────────────────────────────────────────────────
# If an attacker controls this Apache process they can:
#   • Inject arbitrary Shibboleth headers → forge uid/ssoCertThumbprint
#     on /api/token → obtain a JWT for any user they know
#   • Read traffic between browser and backend (plaintext on the proxy lane)
#
# They CANNOT:
#   • Sign new JWTs without the Go app's ephemeral ECDSA signing key
#   • Connect to PostgreSQL (no x509 client cert or private key here)
#   • Read TOTP_MASTER_SECRET (Docker secret, mounted only in app container)
#   • Access Vault directly (not on vault-net network)
#
# Mitigations: ShibbolethRequired check in Go app validates header presence
# AND the SAML assertion chain (IdP-signed, timestamp-validated).
# The Go app performs all business logic; Apache is a dumb proxy here.
#
# RATE LIMITING
# ─────────────
# mod_ratelimit limits per-connection output bandwidth for slow-read mitigation.
# mod_reqtimeout limits slow-POST / slow-header DoS.
# RewriteRule WAF patterns block common injection attempts.
# Go app has an independent per-IP token bucket limiter (see ratelimit.go).
#
# Static file serving: DocumentRoot /var/www/html (./client/src in Docker).
# Variables expanded from process environment:
#   SP_HOSTNAME — virtual host ServerName (e.g. sp.sso.local)
#   APP_BACKEND — upstream Go app (e.g. http://app:8080)
# =============================================================================

# ── Global server banner suppression ─────────────────────────────────────────
# Must be outside any VirtualHost/Directory block.
ServerTokens Prod
ServerSignature Off

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName ${SP_HOSTNAME}

    # Docker internal health probe — served locally; no TLS needed.
    # Healthz is on port 80 so Docker can probe without TLS cert validation.
    <Location /healthz>
        AuthType None
        Require all granted
    </Location>
    Alias /healthz /var/www/html/healthz

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/healthz
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# ── HTTPS — SPA + Shibboleth SP + reverse proxy ──────────────────────────────
<VirtualHost *:443>
    ServerName ${SP_HOSTNAME}

    # ── TLS Configuration ─────────────────────────────────────────────────────
    SSLEngine on
    # DEV: snakeoil self-signed cert (ssl-cert package).
    # PROD: replace with a Vault-issued cert (CN=sp.sso.local, SAN=sp.sso.local):
    #   SSLCertificateFile    /etc/ssl/vault/sp.crt
    #   SSLCertificateKeyFile /etc/ssl/vault/sp.key
    #   SSLCACertificateFile  /etc/ssl/vault/ca-chain.pem
    SSLCertificateFile    /etc/ssl/certs/ssl-cert-snakeoil.pem
    SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key
    # PROD: tighten to TLSv1.3 only:
    #   SSLProtocol TLSv1.3
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1 -TLSv1.2
    SSLCipherSuite        TLSv1.3 TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    SSLHonorCipherOrder   off
    SSLSessionTickets     off

    # ── Slow-read / slow-header DoS protection ─────────────────────────────
    # Header: must arrive within 5s; body: at least 500 bytes/s with 10s grace.
    <IfModule mod_reqtimeout.c>
        RequestReadTimeout header=5-20,minrate=500 body=10-60,minrate=500
    </IfModule>

    # ── Request size limits ────────────────────────────────────────────────
    # API POST bodies are small (fingerprint JSON, CSR payloads).
    # 100 KB is generous; real payloads are < 2 KB.
    LimitRequestBody    102400
    LimitRequestFields  50
    LimitRequestLine    4096

    # ── Static SPA files ──────────────────────────────────────────────────────
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes -FollowSymLinks -ExecCGI
        AllowOverride None
        Require all granted
    </Directory>

    # ── Security headers ─────────────────────────────────────────────────────
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Header always set X-Frame-Options            "DENY"
    Header always set X-Content-Type-Options     "nosniff"
    Header always set Referrer-Policy            "strict-origin-when-cross-origin"
    # X-XSS-Protection: deprecated; modern browsers ignore it; CSP takes over
    Header always set X-XSS-Protection           "0"
    Header always set Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    Header always set Cross-Origin-Opener-Policy "same-origin"
    Header always set Cross-Origin-Resource-Policy "same-origin"

    # CSP: FingerprintJS is bundled locally (fpjs.js); no external script sources needed.
    # 'unsafe-inline' in style-src is limited to inline styles in index.html.
    Header always set Content-Security-Policy \
        "default-src 'self'; \
         script-src 'self'; \
         style-src 'self' 'unsafe-inline'; \
         img-src 'self' data:; \
         font-src 'self'; \
         connect-src 'self'; \
         worker-src 'none'; \
         object-src 'none'; \
         base-uri 'self'; \
         form-action 'self'; \
         frame-ancestors 'none'; \
         upgrade-insecure-requests"

    # Remove server identification banners
    Header always unset Server
    Header always unset X-Powered-By

    # ── Header injection prevention ──────────────────────────────────────────
    # Strip client-supplied Shibboleth attribute headers early (before Shibboleth
    # runs its fixup hook) to prevent clients from spoofing uid/ssoCertThumbprint.
    # The 'early' keyword runs this in Apache's early fixup phase — BEFORE mod_shib
    # populates these headers from the SAML session.  Without 'early', both this
    # directive and mod_shib's header injection run in the same fixup phase, and the
    # unset would clear the legitimate Shibboleth-injected values.
    RequestHeader unset uid                  early
    RequestHeader unset mail                 early
    RequestHeader unset cn                   early
    RequestHeader unset sn                   early
    RequestHeader unset givenName            early
    RequestHeader unset ssoCertThumbprint    early
    RequestHeader unset ssoDeviceFingerprint early
    RequestHeader unset ssoEnrolledAt        early
    RequestHeader unset persistent-id        early
    RequestHeader unset Shib-Session-ID      early
    RequestHeader unset Shib-Identity-Provider early

    # ── WAF rules — block common injection patterns ───────────────────────────
    RewriteEngine On

    # Block path traversal attacks (directory traversal → LFI).
    RewriteCond %{THE_REQUEST} (\.\./|\.\.\\) [NC]
    RewriteRule . - [F,L]

    # Block null byte injection (terminates strings in C-based parsers).
    RewriteCond %{THE_REQUEST} %00 [NC]
    RewriteRule . - [F,L]

    # Block requests with invalid URL encoding (double-encoded traversal).
    RewriteCond %{THE_REQUEST} %25(?:2e|2f|5c) [NC]
    RewriteRule . - [F,L]

    # Block HTTP methods other than GET, HEAD, POST, DELETE, OPTIONS.
    RewriteCond %{REQUEST_METHOD} !^(GET|HEAD|POST|DELETE|OPTIONS)$ [NC]
    RewriteRule . - [F,L]

    # Block suspicious User-Agents (scanners, exploit frameworks).
    RewriteCond %{HTTP_USER_AGENT} (sqlmap|nikto|masscan|zgrab|nmap|python-requests/2\.2[0-9]|Go-http-client/1\.1) [NC]
    RewriteRule . - [F,L]

    # ── Rate limiting — per-connection output (slow-read mitigation) ──────────
    # mod_ratelimit: limits output bandwidth to 1 MB/s per connection.
    # Combined with mod_reqtimeout this defeats slow-read Slowloris variants.
    # Note: mod_ratelimit limits output bytes/sec; it is NOT a request/min limiter.
    # Per-IP request/min rate limiting is in the Go app (ratelimit.go).
    <IfModule mod_ratelimit.c>
        <Location /api/token>
            # Token endpoint: max 512 KB/s output per connection.
            SetOutputFilter RATE_LIMIT
            SetEnv rate-limit 512
        </Location>
        <Location /api/cert/issue>
            # Cert endpoint: max 256 KB/s (cert PEM is ~2 KB; throttle aggressive polling).
            SetOutputFilter RATE_LIMIT
            SetEnv rate-limit 256
        </Location>
    </IfModule>

    # ── Proxy settings ───────────────────────────────────────────────────────
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    # Pass real client IP to Go app's RealIP middleware + rate limiter.
    RequestHeader set X-Real-IP         "%{REMOTE_ADDR}s"

    ProxyTimeout 30
    # ProxyErrorOverride Off: pass backend error bodies through to the SPA
    ProxyErrorOverride Off

    # ── Routing ──────────────────────────────────────────────────────────────
    # Order matters: specific rules first, catch-all last.

    # Shibboleth SP handler — never proxy to backend.
    ProxyPass /Shibboleth.sso !

    # API — proxy everything under /api/ to the Golang backend.
    # JWT middleware enforces authentication on all /api/* paths.
    # /api/token is additionally protected by Shibboleth below.
    ProxyPass        /api/ ${APP_BACKEND}/api/
    ProxyPassReverse /api/ ${APP_BACKEND}/api/

    # Health check — proxy to backend
    ProxyPass        /healthz ${APP_BACKEND}/healthz
    ProxyPassReverse /healthz ${APP_BACKEND}/healthz

    # Everything else falls through to DocumentRoot (serves the SPA).

    # ── Shibboleth SP handler ─────────────────────────────────────────────────
    # Inject SAML assertion attributes as request headers for all paths
    # when a Shibboleth session exists (backend reads these on /api/token).
    <Location />
        ShibUseHeaders On
    </Location>

    <Location /Shibboleth.sso>
        SetHandler shib
        AuthType   None
        Require    all granted
    </Location>

    # ── Token endpoint — requires valid SAML session ──────────────────────────
    # This is the ONLY path where Shibboleth authentication is enforced.
    # mod_shib populates uid, mail, ssoCertThumbprint, etc. before the request
    # reaches the Golang backend.  If no session exists, Shibboleth redirects
    # the browser to the IdP automatically.
    <Location /api/token>
        AuthType shibboleth
        ShibRequestSetting requireSession 1
        Require shib-session
    </Location>

    # ── JWKS and healthz — fully public ──────────────────────────────────────
    <Location /api/.well-known/jwks.json>
        AuthType None
        Require  all granted
        ShibRequestSetting requireSession 0
    </Location>

    <Location /healthz>
        AuthType None
        Require  all granted
        ShibRequestSetting requireSession 0
    </Location>

    # ── Access logging — include Shibboleth attributes for audit ─────────────
    # uid and ssoCertThumbprint are set by mod_shib on authenticated requests;
    # they appear as '-' on unauthenticated paths.
    # This log provides an IdP-independent audit trail of all API accesses.
    LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" uid=%{uid}e cert=%{ssoCertThumbprint}e req=%{X-Request-Id}i" sso_combined
    ErrorLog  ${APACHE_LOG_DIR}/sp-error.log
    CustomLog ${APACHE_LOG_DIR}/sp-access.log sso_combined
</VirtualHost>
