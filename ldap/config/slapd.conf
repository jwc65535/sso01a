# =============================================================================
# ldap/config/slapd.conf — REFERENCE ONLY
#
# This file is NOT used at runtime. bitnami/openldap uses OLC (cn=config),
# which means all configuration is stored as LDIF inside the slapd.d/
# directory and managed via ldapmodify. This traditional slapd.conf format
# is provided purely for documentation — it shows the logical equivalent
# of the OLC configuration applied by entrypoint.sh.
#
# OLC path equivalents:
#   include                → olcSchemaConfig entries in cn=schema,cn=config
#   access to             → olcAccess attributes in olcDatabase={N}mdb,cn=config
#   database / suffix     → olcDatabase={N}mdb,cn=config with olcSuffix
# =============================================================================

# ── Schemas ────────────────────────────────────────────────────────────────────
include  /etc/ldap/schema/core.schema
include  /etc/ldap/schema/cosine.schema
include  /etc/ldap/schema/inetorgperson.schema
# Custom SSO schema (defines ssoUser, ssoDeviceFingerprint, ssoCertThumbprint)
include  /etc/ldap/schema/sso.schema

# ── Global settings ───────────────────────────────────────────────────────────
pidfile  /var/run/slapd/slapd.pid
argsfile /var/run/slapd/slapd.args
loglevel 256

# ── TLS (production; dev uses plain LDAP on port 1389) ────────────────────────
# TLSCACertificateFile  /vault/rendered/ca-chain.pem
# TLSCertificateFile    /etc/ldap/tls/server.crt
# TLSCertificateKeyFile /etc/ldap/tls/server.key
# TLSVerifyClient       never

# ── Database ──────────────────────────────────────────────────────────────────
database        mdb
suffix          "dc=sso,dc=local"
rootdn          "cn=admin,dc=sso,dc=local"
# rootpw is set from Docker secret; never hard-coded
# rootpw          {SSHA}...

directory       /var/lib/ldap
maxsize         1073741824    # 1 GiB

# ── ACLs — equivalent of acl/00-global-acl.ldif ──────────────────────────────

# Rule 0: userPassword — authentication only, never readable
access to attrs=userPassword
    by self           write
    by anonymous      auth
    by *              none

# Rule 1: Certificate attributes — cert-writer writes, everyone reads
# The design principle: certificate (public key) data is intentionally public.
# An attacker reading userCertificate gains only the public key — useless
# without the corresponding private key, which is never stored in LDAP.
access to attrs=userCertificate,ssoCertThumbprint,ssoDeviceFingerprint,ssoEnrolledAt
    by dn.exact="cn=cert-writer,ou=service-accounts,dc=sso,dc=local"  write
    by dn.exact="cn=admin,dc=sso,dc=local"                            write
    by anonymous                                                        read
    by users                                                            read
    by *                                                                none

# Rule 2: Service accounts — self-auth only, admin manages
access to dn.subtree="ou=service-accounts,dc=sso,dc=local"
    by dn.exact="cn=admin,dc=sso,dc=local"   manage
    by self                                   authenticate
    by *                                      none

# Rule 3: User accounts — self r/w, admin manages, authenticated users read
access to dn.subtree="ou=users,dc=sso,dc=local"
    by self                                   write
    by dn.exact="cn=admin,dc=sso,dc=local"   manage
    by users                                  read
    by *                                      none

# Rule 4: Groups — authenticated users read, admin manages
access to dn.subtree="ou=groups,dc=sso,dc=local"
    by dn.exact="cn=admin,dc=sso,dc=local"   manage
    by users                                  read
    by *                                      none

# Rule 5: Everything else — admin manages, authenticated users read, anon none
access to *
    by dn.exact="cn=admin,dc=sso,dc=local"   manage
    by users                                  read
    by *                                      none

# ── Index configuration ────────────────────────────────────────────────────────
index objectClass          eq
index uid                  eq,pres
index cn                   eq,sub
index mail                 eq
index ssoCertThumbprint    eq
# Do not index userCertificate (binary) — use thumbprint for lookups

# ── Size/time limits ──────────────────────────────────────────────────────────
sizelimit   500
timelimit   30
